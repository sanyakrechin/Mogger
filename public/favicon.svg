<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient: Deep Cyber Indigo-Violet (no harsh black) -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0a28" />
      <stop offset="50%" stop-color="#1b1242" />
      <stop offset="100%" stop-color="#0a0e24" />
    </linearGradient>

    <!-- Lightning Bolt Gradient: Neon Violet -> Magenta -> Cyan -->
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc" />
      <stop offset="45%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#00f0ff" />
    </linearGradient>

    <!-- Glow Effect -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Canvas for iOS/Browser Icon -->
  <rect width="512" height="512" rx="120" fill="url(#bgGrad)" />

  <!-- Subtle Inner Radial Aura -->
  <circle cx="256" cy="256" r="160" fill="#8b5cf6" opacity="0.2" filter="blur(30px)" />

  <!-- Sleek, Elegant, Sharp Lightning Bolt Path -->
  <path 
    d="M 284 68 L 152 260 L 252 260 L 220 444 L 364 232 L 268 232 Z" 
    fill="url(#boltGrad)" 
    filter="url(#neonGlow)"
  />
</svg>